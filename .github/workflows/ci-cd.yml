name: CI/CD Pipeline - Schedule Clinic (Java + React)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================================
  # JOB 1: TESTES DO BACKEND (Java/Spring Boot)
  # ========================================
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: schedule_clinic_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Testes Unitários e Integração
        run: mvn test -B
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: schedule_clinic_test
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: 📊 Cobertura de código (JaCoCo > 80%)
        run: |
          mvn verify -B
          echo "✅ Relatório de cobertura gerado em target/site/jacoco/"

  # ========================================
  # JOB 2: TESTES DO FRONTEND (React)
  # ========================================
  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 📦 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🧪 Testes unitários React (Jest)
        run: CI=true npm test -- --coverage --watchAll=false

      - name: 🏗️ Build de produção
        run: npm run build

  # ========================================
  # JOB 3: BUILD & DEPLOY (CD)
  # ========================================
  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐳 Build das imagens Docker
        run: docker compose build

      - name: ✅ Testes de Aceitação (E2E)
        run: |
          docker compose up -d
          for attempt in 1 2 3 4 5; do
            curl -f http://localhost:8080/api/pacientes && break
            sleep 5
          done
          curl -f http://localhost:3000
          docker compose down

      - name: 🚀 Deploy para a AWS
        run: echo "Build validado. Deploy AWS fica condicionado às credenciais e ao pipeline do ambiente alvo."